<html lang="nl">
<head>
<meta charset="UTF-8">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f3f4f6;min-height:100vh;overflow-x:hidden}
#header{background:#111827;color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;gap:12px}
.logo{display:flex;align-items:center;gap:12px;cursor:pointer;order:-1}
.logo-name{font-weight:800;font-size:18px;letter-spacing:-0.5px}
.nav-wrap{position:relative;flex-shrink:0;order:1}
.nav-toggle{background:#374151;border:none;color:#fff;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:18px;line-height:1;display:flex;align-items:center;gap:7px;font-weight:700;font-family:inherit}
.nav-toggle:hover{background:#4b5563}
.nav-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#1f2937;border-radius:12px;min-width:230px;box-shadow:0 8px 32px rgba(0,0,0,.35);z-index:9999;display:none;overflow:hidden;border:1px solid #374151}
.nav-dropdown.open{display:block}
.nav-header{padding:10px 16px 8px;font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:1px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 16px;color:#d1d5db;cursor:pointer;font-size:14px;font-weight:600;border:none;background:none;width:100%;text-align:left;font-family:inherit;transition:background .12s}
.nav-item:hover{background:#374151;color:#fff}
.nav-item.active{background:#1e3a5f;color:#60a5fa}
.nav-divider{height:1px;background:#374151;margin:4px 0}
#main{max-width:860px;margin:0 auto;padding:24px 16px}
.page-title{font-size:19px;font-weight:800;margin:0}
.head-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.btn-blauw{background:#1d4ed8;border:none;color:#fff;border-radius:8px;padding:8px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-blauw:hover{background:#1e40af}
.btn-outline{background:#fff;border:1.5px solid #e5e7eb;border-radius:8px;padding:7px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:#374151}
.btn-outline:hover{border-color:#2563eb;color:#2563eb}
.btn-rood{background:#ef4444;border:none;color:#fff;border-radius:8px;padding:7px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-rood:hover{background:#dc2626}
.btn-back{background:none;border:none;cursor:pointer;color:#6b7280;font-size:20px;padding:0;font-family:inherit}
.empty-state{background:#fff;border-radius:12px;text-align:center;padding:48px 24px;color:#9ca3af;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:700;color:#374151;margin-bottom:6px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:12px;padding:14px 18px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.stat-val{font-size:26px;font-weight:800}
.stat-lbl{font-size:12px;color:#6b7280;margin-top:2px}

/* Revisie cards */
.rev-card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:box-shadow .15s}
.rev-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.rev-card-head{padding:14px 18px;display:flex;align-items:flex-start;gap:14px}
.rev-motor{font-size:16px;font-weight:800;color:#111827}
.rev-sub{font-size:12px;color:#6b7280;margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.rev-body{padding:10px 18px 14px;border-top:1px solid #f3f4f6}
.rev-blok{margin-bottom:8px}
.rev-blok-titel{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.rev-blok-tekst{font-size:13px;color:#374151;white-space:pre-wrap;line-height:1.5}
.ond-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.ond-tag{display:inline-flex;align-items:center;gap:6px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;color:#1d4ed8}
.ond-del{background:none;border:none;cursor:pointer;color:#93c5fd;font-size:14px;padding:0;line-height:1;font-family:inherit}
.ond-del:hover{color:#1d4ed8}
.ond-add-row{display:flex;gap:8px;margin-top:8px}
.ond-add-row .inp{flex:1}

/* Formulier */
.form-card{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.1);padding:24px}
.form-section{margin-bottom:20px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field-label{font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.4px}
.inp{border:1.5px solid #e5e7eb;border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;color:#111827;background:#fff;transition:border-color .15s;width:100%}
.inp:focus{outline:none;border-color:#2563eb}
.textarea{border:1.5px solid #e5e7eb;border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;color:#111827;width:100%;min-height:90px;resize:vertical;line-height:1.5}
.textarea:focus{outline:none;border-color:#2563eb}
.actions-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:24px}

/* Zoekbalk */
.zoek-wrap{position:relative;flex:1;min-width:180px}
.zoek-inp{border:1.5px solid #e5e7eb;border-radius:8px;padding:8px 12px 8px 34px;font-size:14px;font-family:inherit;color:#111827;width:100%;background:#fff}
.zoek-inp:focus{outline:none;border-color:#2563eb}
.zoek-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:15px}

/* Sectie divider */
.sectie-label{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px;padding:0 2px}

@media(max-width:600px){
  #header{height:auto;min-height:52px;padding:8px 12px;gap:8px}
  #main{padding:12px 10px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header id="header">
  <div style="display:flex;align-items:center;gap:10px;order:1;margin-left:auto">
    <div class="nav-wrap">
      <button class="nav-toggle" id="nav-toggle" onclick="toggleNav()">&#9776; <span style="font-size:13px;font-weight:700">Menu</span></button>
      <div class="nav-dropdown" id="nav-dropdown">
        <div class="nav-header">Navigatie</div>
        <button class="nav-item" onclick="window.location.href='index.html'">Sessies</button>
        <button class="nav-item" onclick="window.location.href='motoren.html'">Motoren</button>
        <button class="nav-item" onclick="window.location.href='klanten.html'">Klanten</button>
        <button class="nav-item" onclick="window.location.href='analyse.html'">Analyse</button>
        <button class="nav-item" onclick="window.location.href='carburators.html'">Carburatoren</button>

</header>

<div id="main"><div style="text-align:center;padding:60px;color:#6b7280">&#9203; Laden...</div></div>

<script>
const SUPABASE_URL = 'https://jonfknallwdyknxwcqww.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpvbmZrbmFsbHdkeWtueHdjcXd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNDAwMjUsImV4cCI6MjA5NzgxNjAyNX0.A-uUnNT-Nlwf9ArAd56Ujml5A0XW6G0_mj8RE24On8A';

const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function uuid(){ if(typeof crypto!=='undefined'&&crypto.randomUUID) return crypto.randomUUID(); return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:r&0x3|0x8).toString(16);}); }
const fmtDatum = d => d ? new Date(d+'T00:00:00').toLocaleDateString('nl-NL',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const vandaag = () => new Date().toISOString().slice(0,10);

// ── STATE ─────────────────────────────────────────────────────────────────────
let sb = null;
let motorenCache = {};
let revisies = [];
let view = 'lijst';
let huidig = null;
let zoek = '';
let formulierOnderdelen = []; // onderdelen in bewerking

const OPSLAG = 'tbp_revisies';
const OPSLAG_AC = 'tbp_onderdelen_ac';
let onderdelenAC = [];

function laadRevisies(){ try{ revisies=JSON.parse(localStorage.getItem(OPSLAG)||'[]'); }catch{ revisies=[]; } }
function slaRevisies(){ localStorage.setItem(OPSLAG, JSON.stringify(revisies)); }
function laadOnderdelenAC(){ try{ onderdelenAC=JSON.parse(localStorage.getItem(OPSLAG_AC)||'[]'); }catch{ onderdelenAC=[]; } }
function slaOnderdelenAC(){ localStorage.setItem(OPSLAG_AC, JSON.stringify([...new Set(onderdelenAC)].sort((a,b)=>a.localeCompare(b,'nl')))); }
function voegOnderdeelAcToe(naam){ if(!naam||onderdelenAC.includes(naam)) return; onderdelenAC.push(naam); slaOnderdelenAC(); }

function ondsArray(r){ return Array.isArray(r.onderdelen) ? r.onderdelen : (r.onderdelen?.trim() ? r.onderdelen.split('\n').map(s=>s.trim()).filter(Boolean) : []); }

// ── MOTOR CACHE ───────────────────────────────────────────────────────────────
async function laadMotoren(){
  if(!sb) return;
  const {data,error} = await sb.from('motoren').select('*');
  if(error){ console.error(error); return; }
  motorenCache = {};
  data.forEach(r=>{ motorenCache[r.motor_nummer]={ klant:r.klant||'', motorMerk:r.motor_merk||'', motorType:r.motor_type||'', motorNaam:r.motor_naam||'', status:r.status||'Actief' }; });
}

async function slaMotorOp(mn, klant, motorMerk='', motorType=''){
  if(!sb||!mn) return;
  const bestaand = motorenCache[mn];
  const nieuw = bestaand
    ? { ...bestaand, klant:klant||bestaand.klant, motorMerk:motorMerk||bestaand.motorMerk, motorType:motorType||bestaand.motorType }
    : { klant:klant||'', motorMerk:motorMerk||'', motorType:motorType||'', motorNaam:'', status:'Actief' };
  motorenCache[mn] = nieuw;
  await sb.from('motoren').upsert({ motor_nummer:mn, klant:nieuw.klant, motor_merk:nieuw.motorMerk, motor_type:nieuw.motorType, motor_naam:nieuw.motorNaam, status:nieuw.status, updated_at:new Date().toISOString() });
}

// ── AUTOCOMPLETE ──────────────────────────────────────────────────────────────
function acMotorNummers(){ return Object.keys(motorenCache).filter(Boolean).sort(); }
function acKlanten(){ return [...new Set(Object.values(motorenCache).map(m=>m.klant).filter(Boolean))].sort(); }
function acMotorMerken(){ return [...new Set(Object.values(motorenCache).map(m=>m.motorMerk).filter(Boolean))].sort(); }
function acMotorTypes(){ return [...new Set(Object.values(motorenCache).map(m=>m.motorType).filter(Boolean))].sort(); }

function acInline(el, getVals, onAccept){
  el.addEventListener('input', function(e){
    if(e.inputType&&(e.inputType.startsWith('delete')||e.inputType==='insertFromPaste')) return;
    const val=this.value; if(!val) return;
    const match=getVals().find(s=>s.toLowerCase().startsWith(val.toLowerCase()));
    if(!match||match.toLowerCase()===val.toLowerCase()){ if(match&&onAccept) onAccept(match); return; }
    const start=val.length;
    this.value=match; this.setSelectionRange(start,match.length);
  });
  el.addEventListener('keydown', function(e){
    if((e.key==='Enter'||e.key==='Tab')&&this.selectionStart!==this.selectionEnd){
      e.preventDefault();
      this.setSelectionRange(this.value.length,this.value.length);
      if(onAccept) onAccept(this.value);
    }
  });
}

function mnFill(mn){
  const d = motorenCache[mn]; if(!d) return;
  const klEl=document.getElementById('f-kl'); if(klEl&&!klEl.value&&d.klant) klEl.value=d.klant;
  const mkEl=document.getElementById('f-merk'); if(mkEl&&!mkEl.value&&d.motorMerk) mkEl.value=d.motorMerk;
  const mtEl=document.getElementById('f-type'); if(mtEl&&!mtEl.value&&d.motorType) mtEl.value=d.motorType;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function dezeMannd(){ const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`; }

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  if(view==='lijst') renderLijst();
  else renderForm();
}

function renderLijst(){
  const q = zoek.trim().toLowerCase();
  const gefilterd = q
    ? revisies.filter(r=>[r.motorNummer,r.klant,r.motorMerk,r.motorType,...ondsArray(r)].join(' ').toLowerCase().includes(q))
    : [...revisies];

  gefilterd.sort((a,b)=>(b.datum||'').localeCompare(a.datum||''));

  const dm = dezeMannd();
  const dezeM = revisies.filter(r=>(r.datum||'').startsWith(dm)).length;
  const motoren = new Set(revisies.map(r=>r.motorNummer).filter(Boolean)).size;

  const groepen = {};
  gefilterd.forEach(r=>{
    const mn = r.motorNummer?.trim() || '(geen motor)';
    if(!groepen[mn]) groepen[mn]=[];
    groepen[mn].push(r);
  });

  let statsHtml = revisies.length ? `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${revisies.length}</div><div class="stat-lbl">Revisies totaal</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#2563eb">${dezeM}</div><div class="stat-lbl">Deze maand</div></div>
      <div class="stat-card"><div class="stat-val">${motoren}</div><div class="stat-lbl">Motoren</div></div>
    </div>` : '';

  let lijstHtml = '';
  if(revisies.length===0){
    lijstHtml = `<div class="empty-state">
      <div class="empty-icon">&#128295;</div>
      <div class="empty-title">Nog geen revisies</div>
      <p style="font-size:13px;margin-top:6px">Voeg de eerste revisie toe om onderhoud bij te houden.</p>
    </div>`;
  } else if(gefilterd.length===0){
    lijstHtml = `<div class="empty-state"><div class="empty-title">Geen resultaten voor "${esc(zoek)}"</div></div>`;
  } else {
    const sortedGroepen = Object.entries(groepen).sort(([,a],[,b])=>(b[0]?.datum||'').localeCompare(a[0]?.datum||''));
    sortedGroepen.forEach(([mn,lijst])=>{
      lijstHtml += `<div class="sectie-label">${esc(mn)}</div>`;
      lijst.forEach(r=>{ lijstHtml += revisieKaart(r); });
    });
  }

  document.getElementById('main').innerHTML = `
    <div class="head-row">
      <h2 class="page-title">Revisies</h2>
      <div class="zoek-wrap">
        <span class="zoek-icon">&#128269;</span>
        <input class="zoek-inp" id="zoek-inp" placeholder="Zoek op motor, type, mechanic…" value="${esc(zoek)}">
      </div>
      <button class="btn-blauw" onclick="nieuwRevisie()">+ Nieuwe revisie</button>
    </div>
    ${statsHtml}
    ${lijstHtml}`;

  document.getElementById('zoek-inp')?.addEventListener('input', e=>{ zoek=e.target.value; render(); document.getElementById('zoek-inp')?.focus(); });
}

function revisieKaart(r){
  const onds = ondsArray(r);
  const heeftOpmerking = r.opmerkingen?.trim();
  const heeftBody = onds.length || heeftOpmerking;
  const motorInfo = [r.motorMerk, r.motorType].filter(Boolean).map(esc).join(' · ');
  return `<div class="rev-card" onclick="bewerkRevisie('${esc(r.id)}')">
    <div class="rev-card-head">
      <div style="flex:1;min-width:0">
        <div class="rev-motor">${esc(r.motorNummer||'(geen motor)')}</div>
        ${r.klant?`<div style="font-size:13px;color:#374151;font-weight:600;margin-top:1px">${esc(r.klant)}</div>`:''}
        <div class="rev-sub">
          ${motorInfo?`<span>${motorInfo}</span>`:''}
          <span>&#128197; ${fmtDatum(r.datum)}</span>
          ${r.motorUren?`<span>&#9203; ${esc(r.motorUren)} uur</span>`:''}
        </div>
      </div>
    </div>
    ${heeftBody?`<div class="rev-body">
      ${onds.length?`<div class="rev-blok"><div class="rev-blok-titel">Vervangen onderdelen</div><div class="ond-tags">${onds.sort((a,b)=>a.localeCompare(b,'nl')).map(o=>`<span class="ond-tag">${esc(o)}</span>`).join('')}</div></div>`:''}
      ${heeftOpmerking?`<div class="rev-blok"><div class="rev-blok-titel">Opmerkingen</div><div class="rev-blok-tekst">${esc(r.opmerkingen)}</div></div>`:''}
    </div>`:''}
  </div>`;
}

function renderOnderdelenLijst(){
  const el = document.getElementById('ond-lijst');
  if(!el) return;
  const sorted = [...formulierOnderdelen].sort((a,b)=>a.localeCompare(b,'nl'));
  el.innerHTML = sorted.length
    ? sorted.map(o=>`<span class="ond-tag">${esc(o)}<button class="ond-del" onclick="verwijderFormOnderdeel('${esc(o)}')" title="Verwijder">&#215;</button></span>`).join('')
    : `<span style="font-size:12px;color:#9ca3af">Nog geen onderdelen toegevoegd</span>`;
}

function voegOnderdeelToe(){
  const inp = document.getElementById('f-ond-inp');
  if(!inp) return;
  const naam = inp.value.trim();
  if(!naam) return;
  if(!formulierOnderdelen.includes(naam)) formulierOnderdelen.push(naam);
  voegOnderdeelAcToe(naam);
  inp.value = '';
  inp.focus();
  renderOnderdelenLijst();
}

function verwijderFormOnderdeel(naam){
  formulierOnderdelen = formulierOnderdelen.filter(o=>o!==naam);
  renderOnderdelenLijst();
}

function renderForm(){
  const isNieuw = view==='nieuw';
  const r = huidig || {};
  document.getElementById('main').innerHTML = `
    <div class="head-row" style="margin-bottom:20px">
      <button class="btn-back" onclick="gaTerug()">&#8592;</button>
      <h2 class="page-title">${isNieuw?'Nieuwe revisie':'Revisie bewerken'}</h2>
    </div>
    <div class="form-card">
      <div class="form-section">
        <div class="form-grid">
          <div class="field">
            <label class="field-label">Motornummer *</label>
            <input class="inp" id="f-mn" placeholder="bijv. 001" value="${esc(r.motorNummer||'')}" autocomplete="off">
          </div>
          <div class="field">
            <label class="field-label">Klantnaam</label>
            <input class="inp" id="f-kl" placeholder="bijv. DFK1" value="${esc(r.klant||'')}" autocomplete="off">
          </div>
        </div>
        <div class="form-grid" style="margin-top:14px">
          <div class="field">
            <label class="field-label">Motor merk</label>
            <input class="inp" id="f-merk" placeholder="bijv. Honda" value="${esc(r.motorMerk||'')}" autocomplete="off">
          </div>
          <div class="field">
            <label class="field-label">Motor type</label>
            <input class="inp" id="f-type" placeholder="bijv. X30" value="${esc(r.motorType||'')}" autocomplete="off">
          </div>
        </div>
        <div class="form-grid" style="margin-top:14px">
          <div class="field">
            <label class="field-label">Datum *</label>
            <input class="inp" id="f-datum" type="date" value="${esc(r.datum||vandaag())}">
          </div>
          <div class="field">
            <label class="field-label">Motoruren</label>
            <input class="inp" id="f-uren" type="number" min="0" placeholder="bijv. 120" value="${esc(r.motorUren||'')}">
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="field" style="margin-bottom:14px">
          <label class="field-label">Vervangen onderdelen</label>
          <div class="ond-tags" id="ond-lijst"></div>
          <div class="ond-add-row">
            <input class="inp" id="f-ond-inp" placeholder="Typ onderdeel en druk Enter…" autocomplete="off">
            <button class="btn-blauw" onclick="voegOnderdeelToe()" style="white-space:nowrap">+ Toevoegen</button>
          </div>
        </div>
        <div class="field">
          <label class="field-label">Opmerkingen</label>
          <textarea class="textarea" id="f-op" placeholder="Bijzonderheden, aanbevelingen…">${esc(r.opmerkingen||'')}</textarea>
        </div>
      </div>

      <div id="fout-box" style="display:none;background:#fee2e2;color:#991b1b;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;font-weight:600"></div>

      <div class="actions-row">
        <button class="btn-blauw" onclick="slaOp()">Opslaan</button>
        <button class="btn-outline" onclick="gaTerug()">Annuleren</button>
        ${!isNieuw?`<button class="btn-rood" style="margin-left:auto" onclick="verwijderRevisie('${esc(r.id)}')">Verwijderen</button>`:''}
      </div>
    </div>`;
  renderOnderdelenLijst();
  acInline(document.getElementById('f-mn'), acMotorNummers, mn=>mnFill(mn));
  document.getElementById('f-mn').addEventListener('change', e=>mnFill(e.target.value.trim()));
  acInline(document.getElementById('f-kl'), acKlanten);
  acInline(document.getElementById('f-merk'), acMotorMerken);
  acInline(document.getElementById('f-type'), acMotorTypes);
  const ondInp = document.getElementById('f-ond-inp');
  acInline(ondInp, ()=>onderdelenAC);
  ondInp.addEventListener('keydown', e=>{ if(e.key==='Enter'&&ondInp.selectionStart===ondInp.selectionEnd){ e.preventDefault(); voegOnderdeelToe(); } });
}

// ── ACTIES ────────────────────────────────────────────────────────────────────
function nieuwRevisie(mn=''){
  const d = mn ? motorenCache[mn] : null;
  huidig = { id:uuid(), motorNummer:mn, klant:d?.klant||'', motorMerk:d?.motorMerk||'', motorType:d?.motorType||'', datum:vandaag(), motorUren:'', onderdelen:[], opmerkingen:'' };
  formulierOnderdelen = [];
  view = 'nieuw';
  render();
}

function bewerkRevisie(id){
  huidig = revisies.find(r=>r.id===id)||null;
  if(!huidig) return;
  formulierOnderdelen = ondsArray(huidig);
  view = 'edit';
  render();
}

function gaTerug(){ huidig=null; view='lijst'; render(); }

function slaOp(){
  const mn = document.getElementById('f-mn').value.trim();
  const datum = document.getElementById('f-datum').value.trim();
  if(!mn || !datum){
    const b=document.getElementById('fout-box');
    b.textContent='&#9888;&#65039; Vul motornummer en datum in.';
    b.style.display='block';
    return;
  }
  const klant     = document.getElementById('f-kl').value.trim();
  const motorMerk = document.getElementById('f-merk').value.trim();
  const motorType = document.getElementById('f-type').value.trim();
  const onds = [...formulierOnderdelen].sort((a,b)=>a.localeCompare(b,'nl'));
  onds.forEach(voegOnderdeelAcToe);
  const obj = {
    id: huidig.id,
    motorNummer: mn,
    klant,
    motorMerk,
    motorType,
    datum,
    motorUren:   document.getElementById('f-uren').value.trim(),
    onderdelen:  onds,
    opmerkingen: document.getElementById('f-op').value.trim(),
  };
  const idx = revisies.findIndex(r=>r.id===obj.id);
  if(idx>=0) revisies[idx]=obj; else revisies.unshift(obj);
  slaRevisies();
  slaMotorOp(mn, klant, motorMerk, motorType);
  gaTerug();
}

function verwijderRevisie(id){
  customConfirm({
    titel:'Revisie verwijderen?',
    tekst:'Deze revisie wordt permanent verwijderd.',
    icoon:'&#128465;&#65039;',
    bevestig:'Verwijderen',
    bevestigKleur:'#ef4444',
    onOk:()=>{
      revisies = revisies.filter(r=>r.id!==id);
      slaRevisies();
      gaTerug();
    }
  });
}

// ── CUSTOM CONFIRM ────────────────────────────────────────────────────────────
function customConfirm({titel='',tekst='',icoon='',bevestig='OK',bevestigKleur='#1d4ed8',onOk}={}){
  const el=document.createElement('div');
  el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
  el.innerHTML=`<div style="background:#fff;border-radius:14px;padding:28px 32px;box-shadow:0 8px 40px rgba(0,0,0,0.18);max-width:340px;width:90%;text-align:center">
    ${icoon?`<div style="font-size:32px;margin-bottom:10px">${icoon}</div>`:''}
    <div style="font-size:16px;font-weight:700;color:#111827;margin-bottom:6px">${titel}</div>
    ${tekst?`<div style="font-size:13px;color:#6b7280;margin-bottom:20px">${tekst}</div>`:'<div style="margin-bottom:20px"></div>'}
    <div style="display:flex;gap:10px;justify-content:center">
      <button style="background:#f3f4f6;border:none;border-radius:8px;padding:9px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit" onclick="this.closest('div[style]').remove()">Annuleren</button>
      <button style="background:${bevestigKleur};border:none;border-radius:8px;padding:9px 20px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit" id="cc-ok">${bevestig}</button>
    </div>
  </div>`;
  document.body.appendChild(el);
  el.querySelector('#cc-ok').onclick=()=>{el.remove();onOk();};
  el.addEventListener('click',e=>{if(e.target===el)el.remove();});
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function toggleNav(){ document.getElementById('nav-dropdown').classList.toggle('open'); }
document.addEventListener('click',e=>{ if(!e.target.closest('.nav-wrap')) document.getElementById('nav-dropdown')?.classList.remove('open'); });

async function doLogout(){
  try{ const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY); await sb.auth.signOut(); }catch{}
  window.location.href='index.html';
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  try{
    sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    const {data:{session}}=await sb.auth.getSession();
    if(!session){window.location.href='index.html';return;}
  }catch{window.location.href='index.html';return;}
  await laadMotoren();
  laadRevisies();
  laadOnderdelenAC();
  const voorMotor = localStorage.getItem('tbp_revisie_motor');
  if(voorMotor){ localStorage.removeItem('tbp_revisie_motor'); nieuwRevisie(voorMotor); } else { render(); }
}
init();
</script>
