<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f3f4f6;min-height:100vh;overflow-x:hidden}
#header{background:#111827;color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;gap:12px}
.logo{display:flex;align-items:center;gap:12px;cursor:pointer;order:-1}
.logo-name{font-weight:800;font-size:18px;letter-spacing:-0.5px}
#main{max-width:1060px;margin:0 auto;padding:24px 16px}
.inp{border:1.5px solid #e5e7eb;border-radius:8px;padding:8px 12px;font-size:14px;color:#111827;background:#fff;outline:none;font-family:inherit;width:100%}
.inp:focus{border-color:#2563eb}
.badge{padding:2px 10px;border-radius:999px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.badge-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.b-geslaagd{background:#d1fae5;color:#065f46}.b-geslaagd .badge-dot{background:#10b981}
.b-afgekeurd{background:#fee2e2;color:#991b1b}.b-afgekeurd .badge-dot{background:#ef4444}
.b-lopend{background:#fef3c7;color:#92400e}.b-lopend .badge-dot{background:#f59e0b}
.tbadge{border-radius:6px;padding:2px 9px;font-size:12px;font-weight:700;white-space:nowrap}
.tb-test{background:#e0e7ff;color:#3730a3}
.tb-inrijden{background:#fef3c7;color:#92400e}
.tb-vermogenstest{background:#ede9fe;color:#5b21b6}
.tb-afstelling{background:#fce7f3;color:#9d174d}
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:7px 12px;text-align:left;font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;background:#f9fafb}
.tbl td{padding:8px 12px;font-size:12px;border-top:1px solid #f3f4f6;vertical-align:middle}
.tbl-border{border:1.5px solid #e5e7eb;border-radius:10px;overflow:hidden}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.sec-label{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.page-title{margin:0;font-size:19px;font-weight:800}
.loading{text-align:center;padding:80px;color:#6b7280;font-size:15px}
.empty-state{background:#fff;border-radius:12px;text-align:center;padding:48px;color:#9ca3af;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.db-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav-wrap{position:relative;flex-shrink:0;order:1}
.nav-toggle{background:#374151;border:none;color:#fff;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:18px;line-height:1;display:flex;align-items:center;gap:7px;font-weight:700;font-family:inherit}
.nav-toggle:hover{background:#4b5563}
.nav-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#1f2937;border-radius:12px;min-width:230px;box-shadow:0 8px 32px rgba(0,0,0,.35);z-index:9999;display:none;overflow:hidden;border:1px solid #374151}
.nav-dropdown.open{display:block}
.nav-header{padding:10px 16px 8px;font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:1px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 16px;color:#d1d5db;cursor:pointer;font-size:14px;font-weight:600;border:none;background:none;width:100%;text-align:left;font-family:inherit;transition:background .12s}
.nav-item:hover{background:#374151;color:#fff}
.nav-item.active{background:#1e3a5f;color:#60a5fa}
.nav-divider{height:1px;background:#374151;margin:4px 0}
/* Analyse-specifieke stijlen */
.sessie-blok{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);margin-bottom:10px;overflow:hidden}
.sessie-blok-head{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;border-bottom:1px solid #f3f4f6}
.sessie-blok-head:hover{background:#f9fafb}
.sessie-blok-motor{font-weight:800;font-size:15px;color:#111827}
.sessie-blok-klant{font-size:13px;font-weight:700;color:#2563eb;margin-left:4px}
.sessie-blok-meta{font-size:12px;color:#6b7280;margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sessie-blok-runs{padding:8px 16px 12px}
.run-rij{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;margin-bottom:4px;transition:background .1s}
.run-rij:hover{background:#f3f4f6}
.run-rij.geselecteerd{background:#eff6ff;border:1.5px solid #bfdbfe}
.run-rij-nr{font-size:11px;font-weight:700;color:#9ca3af;min-width:20px}
.run-rij-test{font-size:12px;font-weight:700;color:#374151;min-width:60px}
.run-rij-data{font-size:12px;color:#6b7280;flex:1}
.run-rij-btn{border:none;border-radius:7px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.run-rij-btn.toevoegen{background:#eff6ff;color:#2563eb;border:1.5px solid #bfdbfe}
.run-rij-btn.toevoegen:hover{background:#dbeafe}
.run-rij-btn.verwijderen{background:#fee2e2;color:#dc2626;border:1.5px solid #fca5a5}
.run-rij-btn.verwijderen:hover{background:#fecaca}
/* Selectiebalk */
.selectie-balk{background:#1e3a5f;border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.selectie-chip{border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;color:#fff}
.selectie-chip button{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:14px;line-height:1;padding:0}

.selectie-label{font-size:13px;font-weight:600;color:#93c5fd;white-space:nowrap}
.vergelijk-btn{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:7px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-left:auto}
.wis-btn{background:none;border:1.5px solid #374151;color:#9ca3af;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.wis-btn:hover{border-color:#6b7280;color:#d1d5db}
/* Vergelijkingsresultaten */
.verg-card{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.1);padding:24px;margin-bottom:16px}
.verg-titel{font-size:16px;font-weight:800;margin-bottom:16px;color:#111827;display:flex;align-items:center;justify-content:space-between;gap:10px}
.chart-wrap{position:relative;margin-bottom:8px}
.chart-wrap-lijn{height:360px}
/* Hover datapanel onder de grafiek */
.lijn-hover-panel{background:#1e293b;border-radius:10px;padding:11px 16px;margin-top:10px;display:none}
.lijn-hover-rpm{font-size:12px;font-weight:700;color:#94a3b8;margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase}
.lijn-hover-rows{display:flex;flex-wrap:wrap;gap:6px 20px}
.lijn-hover-row{display:flex;align-items:center;gap:8px;font-size:13px}
.lijn-hover-dash{width:14px;height:3px;border-radius:2px;flex-shrink:0}
.lijn-hover-lbl{color:#94a3b8;font-size:12px}
.lijn-hover-val{font-weight:700;color:#f1f5f9}
.lijn-hover-diff{font-size:11px;font-weight:600;color:#f87171;margin-left:2px}
.lijn-hover-best{font-size:11px;color:#34d399;margin-left:2px}
/* Vergelijkingstabel */
.vtbl{width:100%;border-collapse:collapse;font-size:13px}
.vtbl th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;background:#f9fafb;border-bottom:1.5px solid #e5e7eb}
.vtbl td{padding:9px 14px;border-top:1px solid #f3f4f6;vertical-align:top}
.vtbl tr.rij-label td:first-child{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;background:#fafafa;white-space:nowrap}
.vtbl td.beste{background:#d1fae5;color:#065f46;font-weight:800}
.kleur-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
.open-pijl{transition:transform .2s;display:inline-block}
.open-pijl.open{transform:rotate(90deg)}
/* Geen-curve melding */
.geen-curve-msg{background:#fef3c7;border:1.5px solid #fcd34d;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400e;margin-top:10px;display:flex;align-items:center;gap:8px}
/* Toggle knop voor HP/Nm */
.toggle-wrap{display:flex;gap:6px;flex-shrink:0}
.toggle-btn{border:1.5px solid #e5e7eb;border-radius:7px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;background:#f9fafb;color:#6b7280;transition:all .15s}
/* Kleur picker in chip */
.kleur-picker-label{position:relative;cursor:pointer;flex-shrink:0;display:flex;align-items:center}
.kleur-picker-input{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
.kleur-picker-swatch{width:14px;height:14px;border-radius:4px;border:2px solid rgba(255,255,255,0.5);transition:border-color .15s;flex-shrink:0}
.kleur-picker-label:hover .kleur-picker-swatch{border-color:#fff}
.toggle-btn.actief{background:#2563eb;color:#fff;border-color:#2563eb}
/* Groepskoppen merk → type → klant */
.groep-merk{margin-bottom:20px}
.groep-merk-head{background:#1e3a5f;color:#e0e7ff;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.groep-type{margin-bottom:8px}
.groep-type-head{background:#e0e7ff;color:#3730a3;border-radius:6px;padding:4px 12px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;display:inline-block}
.groep-klant-head{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.8px;padding:6px 2px 2px 2px}
/* Filter tegels */
.filter-tiles{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.filter-tile{background:#fff;border:1.5px solid #e5e7eb;border-radius:8px;padding:5px 14px;font-size:13px;font-weight:700;cursor:pointer;color:#374151;font-family:inherit;transition:border-color .12s,background .12s,color .12s;white-space:nowrap}
.filter-tile:hover{border-color:#2563eb;color:#2563eb}
.filter-tile.actief{background:#2563eb;border-color:#2563eb;color:#fff}
.filter-tile-teller{font-size:11px;font-weight:600;opacity:.65;margin-left:5px}
/* Analyses lijstweergave */
.analyse-kaart{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);padding:16px 20px;margin-bottom:10px;display:flex;align-items:center;gap:14px;transition:box-shadow .15s}
.analyse-kaart:hover{box-shadow:0 4px 12px rgba(0,0,0,.12)}
.analyse-kaart-body{flex:1;min-width:0;cursor:pointer}
.analyse-kaart-naam{font-size:15px;font-weight:800;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.analyse-kaart-meta{font-size:12px;color:#6b7280;margin-top:3px}
.analyse-acties{display:flex;gap:8px;flex-shrink:0}
/* Editor header */
.editor-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.editor-naam-inp{border:1.5px solid #e5e7eb;border-radius:8px;padding:7px 12px;font-size:15px;font-weight:700;color:#111827;background:#fff;outline:none;font-family:inherit;flex:1;min-width:180px}
.editor-naam-inp:focus{border-color:#2563eb}
.terug-btn{background:#f3f4f6;color:#374151;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.terug-btn:hover{background:#e5e7eb}
.opslaan-btn{background:#16a34a;color:#fff;border:none;border-radius:8px;padding:7px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.opslaan-btn:hover{background:#15803d}
.nieuwe-analyse-btn{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.nieuwe-analyse-btn:hover{background:#1d4ed8}
.verwijder-analyse-btn{background:none;border:1.5px solid #fca5a5;color:#dc2626;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.verwijder-analyse-btn:hover{background:#fee2e2}
.open-analyse-btn{background:#eff6ff;color:#2563eb;border:1.5px solid #bfdbfe;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.open-analyse-btn:hover{background:#dbeafe}
@media(max-width:600px){
  #header{height:auto;min-height:52px;padding:8px 12px;gap:8px}
  #main{padding:12px 10px}
  .btn-lbl{display:none}
  .chart-wrap-lijn{height:240px}
  .chart-wrap-staaf{height:200px}
  .vtbl th,.vtbl td{padding:7px 10px;font-size:12px}
  .selectie-balk{gap:6px}
}

function customConfirm({titel, tekst, icoon='🗑', bevestig='Verwijderen', bevestigKleur='#ef4444', onOk}) {
  document.getElementById('app-confirm')?.remove();
  const el = document.createElement('div');
  el.id = 'app-confirm';
  el.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9998;display:flex;align-items:center;justify-content:center';
  el.innerHTML = `
    <div style="background:#fff;border-radius:14px;padding:28px 32px;box-shadow:0 8px 40px rgba(0,0,0,0.18);max-width:340px;width:90%;text-align:center">
      ${icoon?`<div style="font-size:32px;margin-bottom:10px">${icoon}</div>`:''}
      <div style="font-size:16px;font-weight:700;color:#111827;margin-bottom:6px">${titel}</div>
      ${tekst?`<div style="font-size:13px;color:#6b7280;margin-bottom:22px">${tekst}</div>`:'<div style="margin-bottom:22px"></div>'}
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="ac-cancel" style="padding:8px 22px;border-radius:8px;border:1.5px solid #d1d5db;background:#fff;font-size:14px;font-weight:600;color:#374151;cursor:pointer">Annuleren</button>
        <button class="ac-ok" style="padding:8px 22px;border-radius:8px;border:none;background:${bevestigKleur};font-size:14px;font-weight:600;color:#fff;cursor:pointer">${bevestig}</button>
      </div>
    </div>`;
  el.querySelector('.ac-cancel').onclick = () => el.remove();
  el.querySelector('.ac-ok').onclick = () => { el.remove(); onOk(); };
  el.addEventListener('click', e => { if(e.target===el) el.remove(); });
  document.addEventListener('keydown', function esc(e) {
    if(e.key==='Escape'){ el.remove(); document.removeEventListener('keydown',esc); }
  });
  document.body.appendChild(el);
  el.querySelector('.ac-ok').focus();
}

let sb = null;
let sessies = [];
let geselecteerd = []; // [{run, sessie, kleur}]
let zoek = '';
let openeSessies = new Set();
let lineChartInstance = null;
let lijnModus = 'hp'; // 'hp' of 'nm'
let vergelijkingOpen = false;
let analyseView = 'lijst'; // 'lijst' | 'editor'
let huidigeAnalyseId = null;
let huidigeNaam = '';
let analyseOpgeslagen = [];
let filterMerk = null;
let filterType = null;
let _tileMerken = [];
let _tileTypes = [];

function saveAnalyseState(){
  try{
    localStorage.setItem('analyse_state', JSON.stringify({
      analyseView, huidigeAnalyseId, huidigeNaam,
      geselecteerd: geselecteerd.map(g=>({runId:g.run.id, sessieId:g.sessie.id, kleur:g.kleur})),
      openeSessies: [...openeSessies],
      zoek, lijnModus, vergelijkingOpen, filterMerk, filterType
    }));
  }catch(e){}
}

function restoreAnalyseState(){
  try{
    const raw = localStorage.getItem('analyse_state');
    if(!raw) return;
    const s = JSON.parse(raw);
    analyseView = s.analyseView || 'lijst';
    huidigeAnalyseId = s.huidigeAnalyseId || null;
    huidigeNaam = s.huidigeNaam || '';
    zoek = s.zoek||'';
    lijnModus = s.lijnModus||'hp';
    vergelijkingOpen = s.vergelijkingOpen||false;
    filterMerk = s.filterMerk||null;
    filterType = s.filterType||null;
    if(s.openeSessies) s.openeSessies.forEach(id=>openeSessies.add(id));
    if(s.geselecteerd){
      geselecteerd = s.geselecteerd.flatMap(({runId,sessieId,kleur})=>{
        const sessie = sessies.find(ss=>ss.id===sessieId);
        if(!sessie) return [];
        const run = (sessie.runs||[]).find(r=>r.id===runId);
        if(!run) return [];
        return [{run, sessie, kleur}];
      });
    }
  }catch(e){}
}

function loadAnalyseOpgeslagen(){
  try{ analyseOpgeslagen = JSON.parse(localStorage.getItem('analyses_opgeslagen')||'[]'); }
  catch(e){ analyseOpgeslagen = []; }
}

function saveAnalyseOpgeslagen(){
  try{ localStorage.setItem('analyses_opgeslagen', JSON.stringify(analyseOpgeslagen)); }
  catch(e){}
}

function setKleur(runId, kleur){
  geselecteerd = geselecteerd.map(g=>g.run.id===runId ? {...g, kleur} : g);
  saveAnalyseState();
  if(vergelijkingOpen) setTimeout(()=>tekenLijnChart(), 0);
}

const KLEUREN = ['#2563eb','#dc2626','#16a34a','#d97706','#7c3aed','#0891b2','#db2777','#65a30d'];

const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDt = d => d ? new Date(d).toLocaleString('nl-NL',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
const fmtDatum = d => d ? new Date(d).toLocaleDateString('nl-NL',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const testNr = f => f ? (f.match(/(\d+)\.[^.]+$/)||f.match(/(\d+)$/))?.[1]||'' : '';

function fromRow(r){
  return {id:r.id, motorNummer:r.motor_nummer, klant:r.klant||'', carbu:r.carbu||'',
    testType:r.test_type||'Test', uitkomst:r.uitkomst||'Geslaagd', opmerkingen:r.opmerkingen||'',
    runs:r.runs||[], motorMerk:r.motor_merk||'', motorType:r.motor_type||'', motorNaam:r.motor_naam||'',
    carbuVanBaanHoog:r.carbu_van_baan_hoog||'', carbuVanBaanLaag:r.carbu_van_baan_laag||'',
    carbuTestHoog:r.carbu_test_hoog||'', carbuTestLaag:r.carbu_test_laag||'',
    created_at:r.created_at||''};
}

function badge(s){
  const c={Geslaagd:'b-geslaagd',Afgekeurd:'b-afgekeurd',Lopend:'b-lopend'}[s]||'b-lopend';
  return `<span class="badge ${c}"><span class="badge-dot"></span>${esc(s)}</span>`;
}
function typeBadge(t){
  const c={Inrijden:'tb-inrijden',Vermogenstest:'tb-vermogenstest',Afstelling:'tb-afstelling',Test:'tb-test'}[t]||'tb-test';
  return `<span class="tbadge ${c}">${esc(t)}</span>`;
}

// ── DATABASE ─────────────────────────────────────────────────────────────────
async function dbLoad(){
  const {data,error} = await sb.from('sessies').select('*').order('created_at',{ascending:false});
  if(error){console.error(error);return [];}
  return data.map(fromRow);
}

function toggleNav(){document.getElementById('nav-dropdown').classList.toggle('open');}
document.addEventListener('click',e=>{if(!e.target.closest('.nav-wrap')) document.getElementById('nav-dropdown')?.classList.remove('open');});

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const errEl=document.getElementById('login-error');
  const btn=document.getElementById('login-btn');
  errEl.classList.remove('active');
  if(!email||!pass){errEl.textContent='Vul e-mail en wachtwoord in.';errEl.classList.add('active');return;}
  btn.disabled=true;btn.textContent='Bezig...';
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  btn.disabled=false;btn.textContent='Inloggen';
  if(error){errEl.textContent='Inloggen mislukt.';errEl.classList.add('active');return;}
  await laadEnToon();
}
async function doLogout(){
  document.getElementById('nav-dropdown')?.classList.remove('open');
  if(sb) await sb.auth.signOut();
  window.location.href='index.html';
}

});

// ── SELECTIE ──────────────────────────────────────────────────────────────────
function isGeselecteerd(runId){return geselecteerd.some(g=>g.run.id===runId);}

function toggleRun(sessieId, runId){
  const sessie = sessies.find(s=>s.id===sessieId);
  if(!sessie) return;
  const run = sessie.runs.find(r=>r.id===runId);
  if(!run) return;
  if(isGeselecteerd(runId)){
    geselecteerd = geselecteerd.filter(g=>g.run.id!==runId);
  } else {
    if(geselecteerd.length>=8) return;
    const kleur = KLEUREN[geselecteerd.length];
    geselecteerd = [...geselecteerd, {run, sessie, kleur}];
  }
  saveAnalyseState();
  render();
}

function verwijderUitSelectie(runId){
  geselecteerd = geselecteerd.filter(g=>g.run.id!==runId);
  saveAnalyseState();
  render();
}

function wisSelectie(){
  geselecteerd = [];
  saveAnalyseState();
  render();
}

function clickFilterMerk(i){
  filterMerk = _tileMerken[i] === filterMerk ? null : _tileMerken[i];
  filterType = null;
  saveAnalyseState();
  render();
}
function clickFilterType(i){
  filterType = _tileTypes[i] === filterType ? null : _tileTypes[i];
  saveAnalyseState();
  render();
}

function toggleSessieOpen(sessieId){
  if(openeSessies.has(sessieId)) openeSessies.delete(sessieId);
  else openeSessies.add(sessieId);
  saveAnalyseState();
  render();
}

function setLijnModus(m){
  lijnModus = m;
  saveAnalyseState();
  tekenLijnChart();
  // Update toggle buttons
  document.querySelectorAll('.toggle-btn').forEach(b=>{
    b.classList.toggle('actief', b.dataset.modus===m);
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  if(analyseView==='lijst') renderLijstView();
  else renderEditorView();
}

function renderLijstView(){
  const main = document.getElementById('main');
  if(!main) return;

  const fmtBijgewerkt = d => {
    if(!d) return '';
    const diff = Date.now() - new Date(d).getTime();
    const min = Math.floor(diff/60000);
    if(min<1) return 'zojuist';
    if(min<60) return `${min} min geleden`;
    const uur = Math.floor(min/60);
    if(uur<24) return `${uur} uur geleden`;
    return new Date(d).toLocaleDateString('nl-NL',{day:'2-digit',month:'short',year:'numeric'});
  };

  const kaartenHtml = analyseOpgeslagen.length===0
    ? `<div class="empty-state">
        <div style="font-size:40px;margin-bottom:8px">📊</div>
        <div style="font-weight:700;margin-bottom:6px">Nog geen analyses opgeslagen</div>
        <div style="font-size:13px">Klik op "Nieuwe analyse" om te beginnen</div>
       </div>`
    : analyseOpgeslagen.map(a=>{
        const runs = a.geselecteerd||[];
        const motors = [...new Set(runs.map(r=>{
          const s = sessies.find(x=>x.id===r.sessieId);
          return s ? (s.motorNaam||s.klant||s.motorNummer) : null;
        }).filter(Boolean))];
        const motorsStr = motors.slice(0,3).join(', ') + (motors.length>3?` +${motors.length-3}`:'');
        return `
          <div class="analyse-kaart">
            <div class="analyse-kaart-body" onclick="openAnalyse('${a.id}')">
              <div class="analyse-kaart-naam">${esc(a.naam||'Naamloze analyse')}</div>
              <div class="analyse-kaart-meta">
                ${runs.length} run${runs.length!==1?'s':''}${motorsStr?` · ${esc(motorsStr)}`:''}
                ${a.bijgewerkt?` · bijgewerkt ${fmtBijgewerkt(a.bijgewerkt)}`:''}
              </div>
            </div>
            <div class="analyse-acties">
              <button class="open-analyse-btn" onclick="openAnalyse('${a.id}')">Openen</button>
              <button class="verwijder-analyse-btn" onclick="verwijderAnalyse('${a.id}')">Verwijder</button>
            </div>
          </div>`;
      }).join('');

  main.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <h2 class="page-title">Analyses</h2>
      <button class="nieuwe-analyse-btn" onclick="nieuweAnalyse()">+ Nieuwe analyse</button>
    </div>
    ${kaartenHtml}`;
}

function renderEditorView(){
  const main = document.getElementById('main');
  if(!main) return;

  const zoekLc = zoek.toLowerCase();
  const recentsteDatum = s => {
    const fallback = s.created_at ? new Date(s.created_at).getTime() : 0;
    const datums = (s.runs||[]).map(r=>r.datum ? new Date(r.datum).getTime() : fallback);
    return datums.length ? Math.max(...datums) : fallback;
  };
  const gefilterd = (zoek
    ? sessies.filter(s => [s.motorNummer,s.klant,s.motorMerk,s.motorType].some(v=>(v||'').toLowerCase().includes(zoekLc))
        || (s.runs||[]).some(r=>(r.carbu||'').toLowerCase().includes(zoekLc)||(testNr(r.bestandsnaam)||'').includes(zoekLc)))
    : sessies).slice().sort((a,b) => recentsteDatum(b) - recentsteDatum(a));

  // Bouw filtертegels
  _tileMerken = [...new Set(gefilterd.map(s=>s.motorMerk||'— Onbekend merk'))].sort((a,b)=>a.localeCompare(b,'nl'));
  // Zoek actief → merkfilter negeren, alles tonen
  const zoekActief = zoek.trim().length > 0;
  const gefilterdNaMerk = (filterMerk && !zoekActief) ? gefilterd.filter(s=>(s.motorMerk||'— Onbekend merk')===filterMerk) : gefilterd;
  _tileTypes = [...new Set(gefilterdNaMerk.map(s=>s.motorType||'— Onbekend type'))].sort((a,b)=>a.localeCompare(b,'nl'));
  const gefilterdNaFilter = (filterType && !zoekActief) ? gefilterdNaMerk.filter(s=>(s.motorType||'— Onbekend type')===filterType) : gefilterdNaMerk;

  const merkTilesHtml = `<div class="filter-tiles">${
    _tileMerken.map((m,i)=>{
      const n = gefilterd.filter(s=>(s.motorMerk||'— Onbekend merk')===m).length;
      return `<button class="filter-tile${filterMerk===m?' actief':''}" onclick="clickFilterMerk(${i})">${esc(m)}<span class="filter-tile-teller">${n}</span></button>`;
    }).join('')
  }</div>`;

  const typeTilesHtml = filterMerk && _tileTypes.length > 1 ? `<div class="filter-tiles" style="margin-top:-4px">${
    _tileTypes.map((t,i)=>{
      const n = gefilterdNaMerk.filter(s=>(s.motorType||'— Onbekend type')===t).length;
      return `<button class="filter-tile${filterType===t?' actief':''}" onclick="clickFilterType(${i})" style="font-size:12px">${esc(t)}<span class="filter-tile-teller">${n}</span></button>`;
    }).join('')
  }</div>` : '';

  // Selectiebalk
  let selectieHtml = '';
  if(geselecteerd.length>0){
    const chips = geselecteerd.map((g)=>`
      <span class="selectie-chip" style="background:${g.kleur}">
        <label class="kleur-picker-label" title="Klik om kleur te wijzigen">
          <input type="color" class="kleur-picker-input" value="${g.kleur}" oninput="setKleur('${g.run.id}',this.value)">
          <span class="kleur-picker-swatch" style="background:${g.kleur}"></span>
        </label>
        ${esc(g.sessie.motorNaam||g.sessie.klant||g.sessie.motorNummer)}${testNr(g.run.bestandsnaam)?` #${testNr(g.run.bestandsnaam)}`:''}
        <button onclick="verwijderUitSelectie('${g.run.id}')">✕</button>
      </span>`).join('');
    selectieHtml = `
      <div class="selectie-balk">
        <span class="selectie-label">${geselecteerd.length} run${geselecteerd.length!==1?'s':''} geselecteerd</span>
        ${chips}
        <button class="wis-btn" onclick="wisSelectie()">Wis alles</button>
        ${geselecteerd.length>=2?`<button class="vergelijk-btn" onclick="startAnalyse()">📈 Analyseer</button>`:''}
      </div>`;
  }

  // Sessie lijst — gegroepeerd op merk → type → klant
  let sessieLijst;
  if(gefilterdNaFilter.length===0){
    sessieLijst = `<div class="empty-state"><div style="font-size:40px;margin-bottom:8px">🔍</div><div style="font-weight:600">Geen sessies gevonden</div></div>`;
  } else {
    const renderSessie = s => {
      const isOpen = openeSessies.has(s.id);
      const runs = (s.runs||[]).slice().sort((a,b)=>{
        const na=parseInt(testNr(a.bestandsnaam)||'999999');
        const nb=parseInt(testNr(b.bestandsnaam)||'999999');
        return na-nb;
      });
      const eersteRun = runs[0];
      const runsHtml = !isOpen ? '' : `
        <div class="sessie-blok-runs">
          ${runs.length===0
            ? `<div style="color:#9ca3af;font-size:13px;padding:6px 0">Geen runs in deze sessie</div>`
            : runs.map((r,i)=>{
                const gesel = isGeselecteerd(r.id);
                const tnr = testNr(r.bestandsnaam);
                const heeftCurve = r.curveData&&r.curveData.length>0;
                return `<div class="run-rij ${gesel?'geselecteerd':''}">
                  <span class="run-rij-nr">${i+1}</span>
                  <span class="run-rij-test" style="font-weight:700">${tnr?`Test #${tnr}`:'<span style="color:#d1d5db;font-style:italic;font-size:11px">Geen nr</span>'}</span>
                  <span class="run-rij-data">
                    ${r.vermogen?`<strong>${r.vermogen} HP</strong>`:'— HP'}
                    ${r.koppel?` · ${r.koppel} Nm`:''}
                    ${r.carbu?` · <span style="color:#6b7280">${esc(r.carbu)}</span>`:''}
                    ${heeftCurve?` <span title="Curvepunten beschikbaar" style="color:#10b981;font-size:11px">📈</span>`:''}
                    ${gesel?` <span style="color:${geselecteerd.find(g=>g.run.id===r.id)?.kleur||'#2563eb'};font-weight:700">●</span>`:''}
                  </span>
                  <button class="run-rij-btn ${gesel?'verwijderen':'toevoegen'}"
                    onclick="toggleRun('${s.id}','${r.id}')">
                    ${gesel?'✕ Verwijder':'+ Toevoegen'}
                  </button>
                </div>`;
              }).join('')}
        </div>`;
      return `
        <div class="sessie-blok">
          <div class="sessie-blok-head" onclick="toggleSessieOpen('${s.id}')">
            <span class="open-pijl ${isOpen?'open':''}">▶</span>
            <span class="sessie-blok-motor">${esc(s.motorNummer)}</span>
            <span class="sessie-blok-meta">
              ${typeBadge(s.testType||'Test')}
              ${badge(s.uitkomst||'Geslaagd')}
              <span style="font-size:11px">${eersteRun?.datum?fmtDatum(eersteRun.datum):fmtDatum(s.created_at)}</span>
              <span style="font-size:11px;color:#9ca3af">${runs.length} run${runs.length!==1?'s':''}</span>
            </span>
          </div>
          ${runsHtml}
        </div>`;
    };

    const groepen = new Map();
    for(const s of gefilterdNaFilter){
      const merk  = s.motorMerk  || '— Onbekend merk';
      const type  = s.motorType  || '— Onbekend type';
      const klant = s.klant      || '— Geen klant';
      if(!groepen.has(merk)) groepen.set(merk, new Map());
      const merkMap = groepen.get(merk);
      if(!merkMap.has(type)) merkMap.set(type, new Map());
      const typeMap = merkMap.get(type);
      if(!typeMap.has(klant)) typeMap.set(klant, []);
      typeMap.get(klant).push(s);
    }

    sessieLijst = [...groepen.entries()].map(([merk, types])=>`
      <div class="groep-merk">
        <div class="groep-merk-head">${esc(merk)}</div>
        ${[...types.entries()].map(([type, klanten])=>`
          <div class="groep-type">
            <div class="groep-type-head">${esc(type)}</div>
            ${[...klanten.entries()].map(([klant, lijst])=>`
              <div>
                ${klant!=='— Geen klant'?`<div class="groep-klant-head">${esc(klant)}</div>`:''}
                ${lijst.map(renderSessie).join('')}
              </div>
            `).join('')}
          </div>
        `).join('')}
      </div>
    `).join('');
  }

  if(geselecteerd.length<2) vergelijkingOpen = false;
  const vergelijkingHtml = vergelijkingOpen && geselecteerd.length>=2 ? renderVergelijking() : '';

  main.innerHTML = `
    <div class="editor-header">
      <button class="terug-btn" onclick="gaNaarLijst()">← Terug</button>
      <span style="font-size:15px;font-weight:800;color:#111827;flex:1">${esc(huidigeNaam||'Nieuwe analyse')}</span>
    </div>
    ${vergelijkingHtml}
    ${selectieHtml}
    <div style="margin-bottom:12px">
      <input class="inp" id="zoek-inp" value="${esc(zoek)}" placeholder="🔍  Zoek op motor, klant, merk...">
    </div>
    ${merkTilesHtml}
    ${filterMerk || zoekActief ? `${!zoekActief ? typeTilesHtml : ''}<div class="sec-label" style="margin-top:4px">Selecteer runs om te vergelijken (📈 = curvepunten beschikbaar)</div>${sessieLijst}` : ''}`;

  const zoekInp = document.getElementById('zoek-inp');
  zoekInp?.addEventListener('input', e => {
    const pos = e.target.selectionStart;
    zoek = e.target.value;
    render();
    const nieuw = document.getElementById('zoek-inp');
    if(nieuw){ nieuw.focus(); nieuw.setSelectionRange(pos, pos); }
    if(zoek.trim()){
      setTimeout(()=>{
        const inp = document.getElementById('zoek-inp');
        if(inp){
          const top = inp.getBoundingClientRect().top + window.scrollY - 66;
          window.scrollTo({top: Math.max(0, top), behavior:'smooth'});
        }
      }, 30);
    }
  });

  if(geselecteerd.length>=2) setTimeout(()=>tekenLijnChart(),0);
}

// ── VERGELIJKING ──────────────────────────────────────────────────────────────
function renderVergelijking(){
  const cols = geselecteerd.map((g)=>{
    const r = g.run;
    const s = g.sessie;
    const tnr = testNr(r.bestandsnaam);
    return {
      label: `${esc(s.motorNummer)}${tnr?' #'+tnr:''}`,
      kleur: g.kleur,
      motor: esc(s.motorNummer),
      klant: esc(s.klant||'—'),
      datum: r.datum ? fmtDt(r.datum) : '—',
      testNr: tnr||'—',
      testType: s.testType||'Test',
      uitkomst: s.uitkomst||'—',
      vermogen: r.vermogen||null,
      vermogenRpm: r.vermogenRpm||null,
      koppel: r.koppel||null,
      koppelRpm: r.koppelRpm||null,
      maxRpm: r.toeren||null,
      carbu: r.carbu||s.carbu||'—',
      vanBaanH: s.carbuVanBaanHoog||'—',
      vanBaanL: s.carbuVanBaanLaag||'—',
      testH: s.carbuTestHoog||'—',
      testL: s.carbuTestLaag||'—',
      opmerkingen: r.opmerkingen||'—',
    };
  });

  const besteVerm = Math.max(...cols.map(c=>parseFloat(c.vermogen)||0));
  const besteKoppel = Math.max(...cols.map(c=>parseFloat(c.koppel)||0));
  const besteRpm = Math.max(...cols.map(c=>parseFloat(c.maxRpm)||0));

  const header = cols.map(c=>`<th><span style="display:flex;align-items:center;gap:6px"><span class="kleur-dot" style="background:${c.kleur}"></span>${c.label}</span></th>`).join('');

  const rij = (lbl,veld,beste=null,fmt=v=>v??'—')=>`
    <tr class="rij-label">
      <td>${lbl}</td>
      ${cols.map((c,i)=>{
        const val = c[veld];
        const isBeste = beste!==null && parseFloat(val)===beste && beste>0;
        return `<td class="${isBeste?'beste':''}">${fmt(val,i)}</td>`;
      }).join('')}
    </tr>`;

  const tabel = `
    <div class="tbl-scroll">
    <table class="vtbl">
      <thead><tr><th style="min-width:140px">Metriek</th>${header}</tr></thead>
      <tbody>
        ${rij('Motor','motor')}
        ${rij('Klant','klant')}
        ${rij('Datum','datum')}
        ${rij('Test #','testNr')}
        ${rij('Type',null,null,(_,i)=>typeBadge(cols[i]?.testType||'Test'))}
        ${rij('Uitkomst',null,null,(_,i)=>badge(cols[i]?.uitkomst||'—'))}
        <tr><td colspan="${cols.length+1}" style="background:#f3f4f6;padding:4px 14px;font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px">Meetresultaten</td></tr>
        ${rij('Vermogen','vermogen',besteVerm,v=>v?`<strong>${v} HP</strong>`:'—')}
        ${rij('@ RPM (verm.)','vermogenRpm',null,v=>v?`${Number(v).toLocaleString()} RPM`:'—')}
        ${rij('Koppel','koppel',besteKoppel,v=>v?`<strong>${v} Nm</strong>`:'—')}
        ${rij('@ RPM (koppel)','koppelRpm',null,v=>v?`${Number(v).toLocaleString()} RPM`:'—')}
        ${rij('Max RPM','maxRpm',besteRpm,v=>v?Number(v).toLocaleString():'—')}
        <tr><td colspan="${cols.length+1}" style="background:#f3f4f6;padding:4px 14px;font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px">Carburatie</td></tr>
        ${rij('Carbu (run)','carbu')}
        ${rij('Van baan — Hoog','vanBaanH')}
        ${rij('Van baan — Laag','vanBaanL')}
        ${rij('Voor test — Hoog','testH')}
        ${rij('Voor test — Laag','testL')}
        <tr><td colspan="${cols.length+1}" style="background:#f3f4f6;padding:4px 14px;font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px">Opmerkingen</td></tr>
        ${rij('Opmerkingen','opmerkingen')}
      </tbody>
    </table>
    </div>`;

  // Controleer welke runs curvedata hebben
  const metCurve = geselecteerd.filter(g=>(g.run.curveData||[]).length>0);
  const zonderCurve = geselecteerd.filter(g=>!(g.run.curveData||[]).length);

  const geenCurveMsg = zonderCurve.length>0 ? `
    <div class="geen-curve-msg">
      ⚠️ <strong>${zonderCurve.map(g=>`${g.sessie.motorNummer}${testNr(g.run.bestandsnaam)?' #'+testNr(g.run.bestandsnaam):''}`).join(', ')}</strong>
      ${zonderCurve.length===1?'heeft':'hebben'} geen curvepunten — herlaad de SPX om de lijngrafieken te zien.
    </div>` : '';

  return `
    <div id="vergelijking-sectie">
      <div class="verg-card">
        <div class="verg-titel">
          📈 Vermogenskromme
          <div class="toggle-wrap">
            <button class="toggle-btn actief" data-modus="hp" onclick="setLijnModus('hp')">HP</button>
            <button class="toggle-btn" data-modus="nm" onclick="setLijnModus('nm')">Nm</button>
          </div>
        </div>
        <div class="chart-wrap chart-wrap-lijn"><canvas id="lijn-chart"></canvas></div>
        <div class="lijn-hover-panel" id="lijn-hover-panel"></div>
        ${geenCurveMsg}
      </div>
      <div class="verg-card">
        <div class="verg-titel">📋 Vergelijkingstabel</div>
        ${tabel}
      </div>
    </div>`;
}

// ── LIJNGRAFIEKEN (HP of Nm vs RPM) ──────────────────────────────────────────

// Lineaire interpolatie: geef de y-waarde op een bepaald RPM punt
function lerpY(punten, rpm){
  if(!punten.length||rpm<punten[0].x||rpm>punten[punten.length-1].x) return null;
  let lo=0, hi=punten.length-1;
  while(hi-lo>1){const m=(lo+hi)>>1; if(punten[m].x<=rpm) lo=m; else hi=m;}
  const {x:x0,y:y0}=punten[lo], {x:x1,y:y1}=punten[hi];
  if(x1===x0) return y0;
  return Math.round((y0+(rpm-x0)/(x1-x0)*(y1-y0))*10)/10;
}

function tekenLijnChart(){
  const canvas = document.getElementById('lijn-chart');
  if(!canvas) return;
  if(lineChartInstance){lineChartInstance.destroy();lineChartInstance=null;}

  const isHp = lijnModus==='hp';
  const yLabel = isHp ? 'HP' : 'Nm';

  // Bouw gesorteerde puntenarrays per run
  const runPunten = geselecteerd
    .filter(g=>(g.run.curveData||[]).length>0)
    .map(g=>{
      const rawCurve = g.run.curveData||[];
      const maxHp = Math.max(...rawCurve.map(p=>p.hp||0));
      const isWatts = maxHp > 100;
      let pts = rawCurve.map(p=>({
        x: p.rpm,
        y: isHp
          ? (isWatts ? Math.round(p.hp/745.7*10)/10 : p.hp)
          : (isWatts ? Math.round(p.nm/10*10)/10 : p.nm)
      }));
      pts.sort((a,b)=>a.x-b.x);
      // Spike-detectie na piekpunt
      if(pts.length>20){
        const pi=pts.reduce((mi,p,i)=>p.y>pts[mi].y?i:mi,0);
        if(pi>pts.length*0.2){
          // Volledige curve: grote spikes (≥0.4 HP) afknippen
          for(let i=pi+1;i<pts.length;i++){
            if(pts[i].y>pts[i-1].y+0.4){pts=pts.slice(0,i);break;}
          }
          // Laatste 20 punten: ook kleine spikes (≥0.2 HP) afknippen
          const checkVan=Math.max(pi+1, pts.length-20);
          for(let i=checkVan;i<pts.length;i++){
            if(pts[i].y>pts[i-1].y+0.2){pts=pts.slice(0,i);break;}
          }
        }
      }
      return {g, pts};
    });

  if(runPunten.length===0){
    const ctx2=canvas.getContext('2d');
    ctx2.clearRect(0,0,canvas.width,canvas.height);
    ctx2.fillStyle='#9ca3af'; ctx2.font='14px Inter,system-ui,sans-serif'; ctx2.textAlign='center';
    ctx2.fillText('Geen curvepunten beschikbaar — herlaad de SPX-bestanden',canvas.width/2,canvas.height/2);
    return;
  }

  // Gemeenschappelijk RPM-raster (50 RPM stappen) — alle runs op exact dezelfde x-waarden
  const alleRpm = runPunten.flatMap(({pts})=>pts.map(p=>p.x));
  const minRpm = Math.floor(Math.min(...alleRpm)/500)*500;
  const maxRpm = Math.ceil(Math.max(...alleRpm)/500)*500;
  const raster = [];
  for(let rpm=minRpm; rpm<=maxRpm; rpm+=50) raster.push(rpm);

  // Interpoleer elke run op het raster → null buiten het RPM-bereik van die run
  const datasets = runPunten.map(({g,pts})=>{
    const tnr = testNr(g.run.bestandsnaam);
    const naam = g.sessie.motorNaam || g.sessie.klant || g.sessie.motorNummer;
    return {
      label: `${naam}${tnr?' #'+tnr:''}`,
      data: raster.map(rpm=>lerpY(pts,rpm)),
      borderColor: g.kleur,
      backgroundColor: 'transparent',
      borderWidth: 2.5,
      pointRadius: 0,
      tension: 0.4,
      fill: false,
      spanGaps: false,
    };
  });

  // Crosshair plugin — tekent een verticale stippellijn bij hover
  const crosshairPlugin = {
    id:'crosshair',
    afterDraw(chart){
      if(!chart.tooltip?._active?.length) return;
      const ctx2 = chart.ctx;
      const x = chart.tooltip._active[0].element.x;
      const {top,bottom} = chart.scales.y;
      ctx2.save();
      ctx2.beginPath();
      ctx2.moveTo(x,top);
      ctx2.lineTo(x,bottom);
      ctx2.lineWidth=1.5;
      ctx2.strokeStyle='rgba(55,65,81,0.35)';
      ctx2.setLineDash([5,4]);
      ctx2.stroke();
      ctx2.restore();
    }
  };

  lineChartInstance = new Chart(canvas, {
    type: 'line',
    data: {labels: raster, datasets},
    plugins: [crosshairPlugin],
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {mode:'index', intersect:false},
      plugins: {
        legend: {
          position:'top',
          labels:{font:{family:'Inter,system-ui,sans-serif',size:12},padding:16,boxWidth:20,boxHeight:3,usePointStyle:true,pointStyle:'line'}
        },
        tooltip: {
          enabled: false,
          external(context){
            const panel = document.getElementById('lijn-hover-panel');
            if(!panel) return;
            const tt = context.tooltip;
            if(!tt.dataPoints?.length || tt.opacity===0){panel.style.display='none';return;}
            const rpm = raster[tt.dataPoints[0].dataIndex];
            const geldig = tt.dataPoints.filter(dp=>dp.parsed.y!==null);
            const maxVal = geldig.length ? Math.max(...geldig.map(dp=>dp.parsed.y)) : null;
            let html=`<div class="lijn-hover-rpm">${Number(rpm).toLocaleString()} RPM</div><div class="lijn-hover-rows">`;
            for(const dp of geldig){
              const val = dp.parsed.y;
              const diff = maxVal!==null ? Math.round((val-maxVal)*10)/10 : null;
              const diffHtml = diff!==null && diff!==0
                ? `<span class="lijn-hover-diff">${diff>0?'+':''}${diff} ${yLabel}</span>`
                : `<span class="lijn-hover-best">▲</span>`;
              html+=`<div class="lijn-hover-row">
                <span class="lijn-hover-dash" style="background:${dp.dataset.borderColor}"></span>
                <span class="lijn-hover-lbl">${dp.dataset.label}</span>
                <span class="lijn-hover-val">${val} ${yLabel}</span>
                ${diffHtml}
              </div>`;
            }
            html+='</div>';
            panel.innerHTML=html;
            panel.style.display='block';
          }
        }
      },
      scales: {
        x: {
          title: {display:true, text:'Motor RPM', font:{family:'Inter,system-ui,sans-serif',size:12}, color:'#6b7280'},
          ticks: {font:{family:'Inter,system-ui,sans-serif'}, callback:(_,i)=>i%20===0?Number(raster[i]).toLocaleString():null, maxRotation:0},
          grid: {color:'#f3f4f6'}
        },
        y: {
          min: 0,
          title: {display:true, text:yLabel, font:{family:'Inter,system-ui,sans-serif',size:12}, color:'#6b7280'},
          ticks: {font:{family:'Inter,system-ui,sans-serif'}},
          grid: {color:'#f3f4f6'}
        }
      }
    }
  });
}


function genAnalyseNaam(){
  const motors = [...new Set(geselecteerd.map(g=>
    g.sessie.motorNaam||g.sessie.klant||g.sessie.motorNummer
  ).filter(Boolean))];
  const datum = new Date().toLocaleDateString('nl-NL',{day:'2-digit',month:'short'});
  if(!motors.length) return `Analyse · ${datum}`;
  if(motors.length<=2) return `${motors.join(' & ')} · ${datum}`;
  return `${motors[0]} +${motors.length-1} · ${datum}`;
}

function startAnalyse(){
  vergelijkingOpen = true;
  // Bestaande analyse updaten of nieuwe aanmaken
  const naam = huidigeAnalyseId
    ? (analyseOpgeslagen.find(a=>a.id===huidigeAnalyseId)?.naam || genAnalyseNaam())
    : genAnalyseNaam();
  huidigeNaam = naam;
  const nu = new Date().toISOString();
  const data = {
    naam,
    geselecteerd: geselecteerd.map(g=>({runId:g.run.id, sessieId:g.sessie.id, kleur:g.kleur})),
    lijnModus, vergelijkingOpen: true, bijgewerkt: nu
  };
  if(huidigeAnalyseId){
    analyseOpgeslagen = analyseOpgeslagen.map(a=>a.id===huidigeAnalyseId ? {...a,...data} : a);
  } else {
    huidigeAnalyseId = crypto.randomUUID();
    analyseOpgeslagen = [{id:huidigeAnalyseId, ...data, aangemaakt:nu}, ...analyseOpgeslagen];
  }
  saveAnalyseOpgeslagen();
  saveAnalyseState();
  render();
  setTimeout(()=>document.getElementById('vergelijking-sectie')?.scrollIntoView({behavior:'smooth',block:'start'}), 50);
}

function openVergelijking(){ startAnalyse(); }

function scrollNaarVergelijking(){
  document.getElementById('vergelijking-sectie')?.scrollIntoView({behavior:'smooth',block:'start'});
}

// ── ANALYSE BEHEER ────────────────────────────────────────────────────────────
function nieuweAnalyse(){
  huidigeAnalyseId = null;
  huidigeNaam = '';
  geselecteerd = [];
  openeSessies = new Set();
  zoek = '';
  lijnModus = 'hp';
  vergelijkingOpen = false;
  analyseView = 'editor';
  saveAnalyseState();
  render();
  window.scrollTo(0,0);
}

function openAnalyse(id){
  const a = analyseOpgeslagen.find(x=>x.id===id);
  if(!a) return;
  huidigeAnalyseId = id;
  huidigeNaam = a.naam||'';
  lijnModus = a.lijnModus||'hp';
  vergelijkingOpen = a.vergelijkingOpen||false;
  openeSessies = new Set();
  zoek = '';
  geselecteerd = (a.geselecteerd||[]).flatMap(({runId,sessieId,kleur})=>{
    const sessie = sessies.find(ss=>ss.id===sessieId);
    if(!sessie) return [];
    const run = (sessie.runs||[]).find(r=>r.id===runId);
    if(!run) return [];
    return [{run, sessie, kleur}];
  });
  analyseView = 'editor';
  saveAnalyseState();
  render();
  window.scrollTo(0,0);
}


function verwijderAnalyse(id){
  customConfirm({
    titel: 'Analyse verwijderen?',
    tekst: 'Dit kan niet ongedaan worden gemaakt.',
    onOk: ()=>{
      analyseOpgeslagen = analyseOpgeslagen.filter(a=>a.id!==id);
      saveAnalyseOpgeslagen();
      render();
    }
  });
}

function gaNaarLijst(){
  analyseView = 'lijst';
  saveAnalyseState();
  render();
  window.scrollTo(0,0);
}

// ── AUTH + INIT ────────────────────────────────────────────────────────────────
async function laadEnToon(){
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('main').innerHTML='<div class="loading">⏳ Laden...</div>';
  document.getElementById('db-status').innerHTML='<span class="db-dot" style="background:#10b981"></span>Supabase';
  sessies = await dbLoad();
  loadAnalyseOpgeslagen();
  restoreAnalyseState();
  render();
}

async function init(){
  try{sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);}catch(e){sb=null;}
  if(!sb){window.location.href='index.html';return;}
  const{data:{session}}=await sb.auth.getSession();
  if(!session){
    document.getElementById('login-screen').classList.add('active');
    return;
  }
  await laadEnToon();
}
init();
</script>
