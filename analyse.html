const fmtTime = d => d ? new Date(d).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '—';
const bestRun = runs => runs?.reduce((b,r)=>{
  if(!b) return r;
  const vB=b.vermogen||0, vR=r.vermogen||0;
  if(vR>vB) return r;
  if(vR===vB && (r.koppel||0)>(b.koppel||0)) return r;
  return b;
},null)||null;
function badge(s) {
  const c={Geslaagd:'b-geslaagd',Afgekeurd:'b-afgekeurd',Lopend:'b-lopend'}[s]||'b-lopend';
  return `<span class="badge ${c}"><span class="badge-dot"></span>${esc(s)}</span>`;
}
function typeBadge(t) {
  const c={Inrijden:'tb-inrijden',Vermogenstest:'tb-vermogenstest',Afstelling:'tb-afstelling',Test:'tb-test'}[t]||'tb-test';
  return `<span class="tbadge ${c}">${esc(t)}</span>`;
}

// ── STORAGE ───────────────────────────────────────────────────────────────────
function loadAnalyses() {
  try { analyses = JSON.parse(localStorage.getItem('tbp_analyses') || '[]'); } catch(e) { analyses = []; }
}
function saveAnalyses() {
  try { localStorage.setItem('tbp_analyses', JSON.stringify(analyses)); } catch(e) {}
}
function loadMotorenLocal() {
  try { const s = localStorage.getItem('motorenCache'); return s ? JSON.parse(s) : {}; } catch { return {}; }
}
function saveState() {
  try { localStorage.setItem('tbp_analyse_view', JSON.stringify({ view, selectedId: selected?.id || null })); } catch(e) {}
}
function restoreState() {
  try {
    const s = JSON.parse(localStorage.getItem('tbp_analyse_view') || '{}');
    if (s.view) view = s.view;
    if (s.selectedId) selected = analyses.find(x => x.id === s.selectedId) || null;
    if (view === 'detail' && !selected) view = 'lijst';
    if (view === 'nieuw') view = 'lijst';
  } catch(e) {}
}

function toggleNav() { document.getElementById('nav-dropdown').classList.toggle('open'); }
document.addEventListener('click', e => { if (!e.target.closest('.nav-wrap')) document.getElementById('nav-dropdown')?.classList.remove('open'); });
function navigeer(v, obj) {
  if (v === 'nieuw') { pendingRuns = [EMPTY_RUN()]; }

}

  document.querySelectorAll('.nav-item[data-nav]').forEach(el => {

}

// ── FILE IMPORT ───────────────────────────────────────────────────────────────
function parseSpx(buffer, filename) {
  const bytes = new Uint8Array(buffer);
  const latin1 = Array.from(bytes).map(b => String.fromCharCode(b)).join('');
  const get = k => { const m = latin1.match(new RegExp(k+'=([^\r\n]+)')); return m ? m[1].trim() : ''; };
  const datetimeRaw = get('datetime');
  let datum = '';
  if (datetimeRaw) {
    const [dp,tp] = datetimeRaw.split(' ');
    if (dp&&tp) { const [d,m,y]=dp.split('/'); datum=`${y}-${m?.padStart(2,'0')}-${d?.padStart(2,'0')}T${tp}`; }
  }
  const pwrMatch = latin1.match(/original_power=([\d.]+)[^/]*\/\s*([\d]+)/);
  const tqMatch  = latin1.match(/original_tq=([\d.]+)[^/]*\/\s*([\d]+)/);
  const rpmMatch = latin1.match(/max_rpm_engine=([\d]+)/);
  const rampMatch= latin1.match(/ramp_time=\s*([\d.]+)/);
  let curveData = [];
  try {
    const lines = latin1.split('\r\n');
    const chInfo = {};
    for (const line of lines) {
      const m2 = line.match(/^channel_info=(.) +([0-9A-Fa-f]+)\|([^|]+)\|([^|]+)\|([^|]+)\|([^|]+)\|([^|]+)\|/);
      if (m2) chInfo[m2[1]] = {name:m2[3].trim(),unit:m2[4].trim(),scale:parseFloat(m2[6])};
    }
    const chOrderLine = lines.find(l=>l.startsWith('channels='))||'';
    const chChars = chOrderLine.split('=')[1]||'';
    const n = parseInt(get('length'))||0;
    let binStartLine = 0;
    for (let i=0;i<lines.length;i++) {
      if (lines[i].length>0&&!lines[i].split('').every(c=>c.charCodeAt(0)>=32||c==='\t')) { binStartLine=i; break; }
    }
    const textPart = lines.slice(0,binStartLine).join('\r\n')+'\r\n';
    const binOffset = textPart.length;
    const dv = new DataView(buffer, binOffset+1);
    const chData = {}; let offset = 0;
    for (const ch of chChars) {
      const info = chInfo[ch];
      if (info&&n>0) { const vals=[]; for(let i=0;i<n;i++) vals.push(dv.getFloat32(offset+i*4,true)); chData[info.name]=vals; }
      offset += n*4;
    }
    const rpmVals = chData['motor RPM']||[];
    const hpVals  = chData['Vermogen']||chData['HP1 Front1']||[];
    const nmVals  = chData['Koppel']||[];
    for (let i=0;i<n;i++) {
      const rpm=rpmVals[i], hp=hpVals[i];
      const nm=nmVals[i]||((rpm>0)?(hp*745.7*60)/(2*Math.PI*rpm):0);
      if (rpm>=5500&&rpm<=16000&&hp>5) curveData.push({rpm:Math.round(rpm),hp:Math.round(hp*10)/10,nm:Math.round(nm*10)/10});
    }
    curveData.sort((a,b)=>a.rpm-b.rpm);
    const step=Math.max(1,Math.floor(curveData.length/150));
    curveData=curveData.filter((_,i)=>i%step===0);
  } catch(e) { curveData=[]; }
  return {
    datum, vermogen:pwrMatch?parseFloat(pwrMatch[1]):'', vermogenRpm:pwrMatch?parseInt(pwrMatch[2]):'',
    koppel:tqMatch?parseFloat(tqMatch[1]):'', koppelRpm:tqMatch?parseInt(tqMatch[2]):'',
    toeren:rpmMatch?parseInt(rpmMatch[1]):'',
    temperatuur:get('temp')?parseFloat(get('temp')):'', luchtvochtigheid:get('humidity')?parseFloat(get('humidity')):'',
    luchtdruk:get('pressure')?parseFloat(get('pressure')):'',
    correctieFactor:get('corr_fact')||'', correctieType:get('corr_type')||'',
    rampTijd:rampMatch?parseFloat(rampMatch[1]):'', dynoBrand:get('dyno_name'),
    bestandsnaam:filename, opmerkingen:'', curveData
  };
}

async function handleFilesDrop(files) {
  if (!files?.length) return;
  const status = document.getElementById('import-status');
  if (status) { status.style.display='block'; status.innerHTML='<span style="color:#6b7280">⏳ Bezig met verwerken...</span>'; }
  const newRuns = [];
  for (const file of files) {
    const buf = await file.arrayBuffer();
    newRuns.push({ ...parseSpx(buf, file.name), id: uuid() });
  }
  selected = { ...selected, runs: [...(selected.runs||[]), ...newRuns], bijgewerkt: new Date().toISOString() };
  analyses = analyses.map(x => x.id === selected.id ? selected : x);
  saveAnalyses();
  if (status) {
    status.innerHTML = `<span style="color:#10b981;font-weight:600">✓ ${newRuns.length} run${newRuns.length!==1?'s':''} toegevoegd</span>`;
    setTimeout(() => { if(status) status.style.display='none'; }, 3000);
  }
  renderDetail();
}

// ── CONFIRM DIALOG ────────────────────────────────────────────────────────────
function customConfirm({titel, tekst, icoon='🗑', bevestig='Verwijderen', bevestigKleur='#ef4444', onOk}) {
  document.getElementById('app-confirm')?.remove();
  const el = document.createElement('div');
  el.id = 'app-confirm';
  el.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9998;display:flex;align-items:center;justify-content:center';
  el.innerHTML = `
    <div style="background:#fff;border-radius:14px;padding:28px 32px;box-shadow:0 8px 40px rgba(0,0,0,.18);max-width:340px;width:90%;text-align:center">
      ${icoon?`<div style="font-size:32px;margin-bottom:10px">${icoon}</div>`:''}
      <div style="font-size:16px;font-weight:700;color:#111827;margin-bottom:6px">${titel}</div>
      ${tekst?`<div style="font-size:13px;color:#6b7280;margin-bottom:22px">${tekst}</div>`:'<div style="margin-bottom:22px"></div>'}
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="ac-cancel" style="padding:8px 22px;border-radius:8px;border:1.5px solid #d1d5db;background:#fff;font-size:14px;font-weight:600;color:#374151;cursor:pointer">Annuleren</button>
        <button class="ac-ok" style="padding:8px 22px;border-radius:8px;border:none;background:${bevestigKleur};font-size:14px;font-weight:600;color:#fff;cursor:pointer">${bevestig}</button>
      </div>
    </div>`;
  el.querySelector('.ac-cancel').onclick = () => el.remove();
  el.querySelector('.ac-ok').onclick = () => { el.remove(); onOk(); };
  el.addEventListener('click', e => { if(e.target===el) el.remove(); });
  document.addEventListener('keydown', function esc(e) {
    if(e.key==='Escape'){ el.remove(); document.removeEventListener('keydown',esc); }
  });
  document.body.appendChild(el);
  el.querySelector('.ac-ok').focus();
}

// ── AUTH + INIT ───────────────────────────────────────────────────────────────
async function init() {
  try { sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) { sb = null; }
  if (!sb) { window.location.href = 'index.html'; return; }
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  document.getElementById('db-status').innerHTML = '<span class="db-dot" style="background:#10b981"></span>Supabase';
  motorenCache = loadMotorenLocal();
  loadAnalyses();
  restoreState();
  render();
}
init();
